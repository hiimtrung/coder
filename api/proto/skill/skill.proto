syntax = "proto3";

package skill;

option go_package = "github.com/trungtran/coder/api/grpc/skillpb";

import "google/protobuf/timestamp.proto";

service SkillService {
  rpc IngestSkill(IngestSkillRequest) returns (IngestSkillResponse);
  rpc SearchSkills(SearchSkillsRequest) returns (SearchSkillsResponse);
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);
  rpc GetSkill(GetSkillRequest) returns (GetSkillResponse);
  rpc DeleteSkill(DeleteSkillRequest) returns (DeleteSkillResponse);
}

message IngestSkillRequest {
  string name = 1;
  string skill_md_content = 2;
  repeated RuleFileEntry rules = 3;
  string source = 4;       // "local", "antigravity", "custom"
  string source_repo = 5;
  string category = 6;
}

message RuleFileEntry {
  string path = 1;
  string content = 2;
}

message IngestSkillResponse {
  string skill_id = 1;
  int32 chunks_total = 2;
  int32 chunks_new = 3;
}

message SearchSkillsRequest {
  string query = 1;
  int32 limit = 2;
}

message SearchSkillsResponse {
  repeated SkillSearchResult results = 1;
}

message SkillSearchResult {
  SkillInfo skill = 1;
  repeated SkillChunkResult chunks = 2;
  float score = 3;
}

message SkillInfo {
  string id = 1;
  string name = 2;
  string description = 3;
  string category = 4;
  string source = 5;
  string source_repo = 6;
  string risk = 7;
  string version = 8;
  repeated string tags = 9;
  int32 chunk_count = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message SkillChunkResult {
  string id = 1;
  string skill_id = 2;
  string chunk_type = 3;
  string title = 4;
  string content = 5;
  int32 chunk_index = 6;
  float score = 7;
}

message ListSkillsRequest {
  string source = 1;
  string category = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListSkillsResponse {
  repeated SkillInfo skills = 1;
}

message GetSkillRequest {
  string name = 1;
}

message GetSkillResponse {
  SkillInfo skill = 1;
  repeated SkillChunkResult chunks = 2;
}

message DeleteSkillRequest {
  string name = 1;
}

message DeleteSkillResponse {
  bool success = 1;
}
