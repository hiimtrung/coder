services:
  postgres:
    image: ankane/pgvector:latest
    container_name: pgvector_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: coder
      POSTGRES_PASSWORD: coder_password
      POSTGRES_DB: coder
    volumes:
      - pg_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_embed
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/usr/bin/sh", "-c"]
    command: 
      - |
        ollama serve &
        sleep 20
        ollama pull mxbai-embed-large
        tail -f /dev/null

  coder-node:
    image: ghcr.io/hiimtrung/coder-node:latest
    container_name: coder_node
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgres://coder:coder_password@postgres:5432/coder?sslmode=disable
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBEDDING_MODEL: mxbai-embed-large
      GRPC_PORT: 50051
      HTTP_PORT: 8080
    ports:
      - "50051:50051"
      - "8080:8080"
    depends_on:
      - postgres
      - ollama

volumes:
  pg_data:
  ollama_data: