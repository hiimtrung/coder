services:
  postgres:
    # pgvector/pgvector supports linux/amd64 + linux/arm64 (replaces ankane/pgvector)
    image: pgvector/pgvector:pg16
    container_name: pgvector_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: coder
      POSTGRES_PASSWORD: coder_password
      POSTGRES_DB: coder
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coder -d coder"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    # ollama/ollama supports linux/amd64 + linux/arm64
    image: ollama/ollama:latest
    container_name: ollama_embed
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        echo "Waiting for ollama to start..."
        until ollama list > /dev/null 2>&1; do sleep 2; done
        echo "Pulling mxbai-embed-large..."
        ollama pull mxbai-embed-large
        echo "Ollama ready."
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  coder-node:
    # multi-arch image: linux/amd64 + linux/arm64
    image: ghcr.io/hiimtrung/coder-node:latest
    container_name: coder_node
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgres://coder:coder_password@postgres:5432/coder?sslmode=disable
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBEDDING_MODEL: mxbai-embed-large
      GRPC_PORT: 50051
      HTTP_PORT: 8080
    ports:
      - "50051:50051"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  pg_data:
  ollama_data: