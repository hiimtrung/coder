services:
  postgres:
    # pgvector/pgvector supports linux/amd64 + linux/arm64 (replaces ankane/pgvector)
    image: pgvector/pgvector:pg18
    container_name: pgvector_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: coder
      POSTGRES_PASSWORD: coder_password
      POSTGRES_DB: coder
    volumes:
      - pg_data:/var/lib/postgresql/data
    # start_period gives postgres time to initialise the data directory on first run
    # (especially important on Debian/Linux x86 where cold init can take 60–90s).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coder -d coder"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  ollama:
    # ollama/ollama supports linux/amd64 + linux/arm64
    image: ollama/ollama:latest
    container_name: ollama_embed
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        echo "Waiting for ollama to start..."
        until ollama list > /dev/null 2>&1; do sleep 2; done
        echo "Pulling mxbai-embed-large..."
        ollama pull mxbai-embed-large
        echo "Ollama ready."
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  coder-node:
    # Production: pulls from registry. Dev: run `docker-compose build coder-node` to build from source.
    # When both build: and image: are set, `docker-compose build` uses the Dockerfile and tags
    # the result with the image name so `docker-compose up` picks it up automatically.
    build:
      context: ..
      dockerfile: Dockerfile.node
    image: ghcr.io/hiimtrung/coder-node:latest
    container_name: coder_node
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgres://coder:coder_password@postgres:5432/coder?sslmode=disable
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBEDDING_MODEL: mxbai-embed-large
      GRPC_PORT: 50051
      HTTP_PORT: 8080
      # Set SECURE_MODE=true to require client authentication.
      # When enabled, the server prints a one-time bootstrap token on first startup.
      # Each developer must run `coder login` with that token to register their machine.
      SECURE_MODE: ${SECURE_MODE:-false}
    ports:
      - "50051:50051"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  pg_data:
  ollama_data: