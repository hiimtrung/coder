services:
  postgres:
    # pgvector/pgvector supports linux/amd64 + linux/arm64
    image: pgvector/pgvector:pg18
    container_name: pgvector_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: coder
      POSTGRES_PASSWORD: coder_password
      POSTGRES_DB: coder
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coder -d coder"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  ollama:
    # Embedding-only Ollama instance — no LLM models, only mxbai-embed-large.
    # All LLM reasoning is handled client-side by your AI agent (Claude, Copilot, etc.).
    image: ollama/ollama:latest
    container_name: ollama_embed
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        echo "Waiting for ollama to start..."
        until ollama list > /dev/null 2>&1; do sleep 2; done
        echo "Pulling mxbai-embed-large (embedding model)..."
        ollama pull mxbai-embed-large
        echo "Ollama ready — embedding service online."
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q mxbai-embed-large"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  coder-node:
    # Production: pulls from registry. Dev: run `docker-compose build coder-node` to build from source.
    build:
      context: ..
      dockerfile: Dockerfile.node
    image: ghcr.io/hiimtrung/coder-node:latest
    container_name: coder_node
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgres://coder:coder_password@postgres:5432/coder?sslmode=disable
      GRPC_PORT: 50051
      HTTP_PORT: 8080
      # Embedding — Ollama (default). Provides semantic vector search for memory + skills.
      EMBEDDING_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBEDDING_MODEL: mxbai-embed-large
      # Secure mode: set to true to require client token registration.
      # On first start, a BOOTSTRAP TOKEN is printed — share it with developers
      # who then run: coder login
      SECURE_MODE: ${SECURE_MODE:-false}
    ports:
      - "50051:50051"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  pg_data:
  ollama_data:
