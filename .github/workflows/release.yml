name: Build & Release

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            VERSION="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::8}"
          else
            VERSION="dev-${GITHUB_SHA::8}"
          fi
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "version=${VERSION}"    >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}"      >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY="coder-${{ matrix.goos }}-${{ matrix.goarch }}"
          [[ "${{ matrix.goos }}" == "windows" ]] && BINARY="${BINARY}.exe"

          PKG="github.com/trungtran/coder/internal/version"
          LDFLAGS="-s -w \
            -X ${PKG}.Version=${{ steps.version.outputs.version }} \
            -X ${PKG}.Commit=${{ steps.version.outputs.commit }} \
            -X ${PKG}.BuildDate=${{ steps.version.outputs.build_date }}"

          mkdir -p dist
          go build -ldflags "${LDFLAGS}" -o "dist/${BINARY}" ./cmd/coder
          echo "Built dist/${BINARY}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 2

  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release assets
        run: |
          cp install-node.sh  dist/
          cp uninstall-node.sh dist/
          cp update-node.sh   dist/
          cp uninstall.sh     dist/
          cp uninstall.ps1    dist/
          cd dist
          sha256sum coder-* install* uninstall* update* > checksums.txt
          echo "── Release assets ──"
          ls -lh

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Pull the block between "## [vX.Y.Z]" and the next "## [" line
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="_No changelog entry found for ${VERSION}. See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full history._"
          fi
          # GitHub Actions multiline output
          {
            echo "notes<<CHANGELOG_EOF"
            echo "${NOTES}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "coder ${{ github.ref_name }}"
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ## Install / Upgrade

            ### macOS / Linux
            ```sh
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh)"
            ```

            ### Windows (PowerShell)
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ```

            ---

            ## coder-node (Self-hosted backend)

            > Requires Docker. Starts PostgreSQL + pgvector + Ollama + coder-node.

            ```sh
            # Open mode — no authentication
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install-node.sh | sh

            # Secure mode — require developer registration
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install-node.sh | sh -s -- --secure
            ```

            **Secure mode**: a one-time bootstrap token is printed to the server logs on first startup.
            Share it with each developer. They run `coder login` and enter the token — access tokens
            are then injected automatically into every gRPC and HTTP call.

            ```sh
            # Retrieve the bootstrap token
            docker logs coder_node 2>&1 | grep 'BOOTSTRAP TOKEN'
            ```

            ---

            ## Update

            ```sh
            # Update CLI
            coder self-update

            # Update coder-node
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/update-node.sh | sh
            ```

            ---

            ## Uninstall

            ```sh
            # CLI — macOS / Linux
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/uninstall.sh | sh -s -- --clear-data

            # CLI — Windows (PowerShell)
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/uninstall.ps1 | iex -Arguments "-ClearData"

            # coder-node — keep data
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/uninstall-node.sh | sh

            # coder-node — wipe everything
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/uninstall-node.sh | sh -s -- --clear-data
            ```

            ---

            **Checksums**: see `checksums.txt` attached below.
            **Full changelog**: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          files: |
            dist/coder-*
            dist/install*
            dist/uninstall*
            dist/update*
            dist/checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false

  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image (coder-node)
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-node
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up QEMU (cross-platform emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.node
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
