{{define "login.html"}}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coder dashboard — login</title>
  <script src="/dashboard/static/js/tailwind.min.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="dark bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl">
      <div class="mb-8 text-center">
        <span class="text-3xl font-bold text-white">coder</span>
        <p class="text-gray-400 text-sm mt-2">Dashboard — sign in with your bootstrap token</p>
      </div>

      {{if .Error}}
      <div class="mb-6 bg-red-900/40 border border-red-700/50 text-red-300 px-4 py-3 rounded-lg text-sm">
        {{.Error}}
      </div>
      {{end}}

      <form method="POST" action="/dashboard/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2" for="bootstrap_token">
            Bootstrap Token
          </label>
          <input
            type="password"
            id="bootstrap_token"
            name="bootstrap_token"
            placeholder="Paste your bootstrap token"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
            required
            autocomplete="off"
          >
        </div>
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-lg transition-colors">
          Sign in
        </button>
      </form>

      <p class="text-center text-xs text-gray-600 mt-6">
        coder {{.Version}}
      </p>
    </div>
  </div>
</body>
</html>
{{end}}
