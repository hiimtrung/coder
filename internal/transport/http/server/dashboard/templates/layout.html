{{define "head"}}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>coder dashboard</title>
<script src="/dashboard/static/js/tailwind.min.js"></script>
<script src="/dashboard/static/js/htmx.min.js"></script>
<script src="/dashboard/static/js/chart.min.js"></script>
<script>
  tailwind.config = { darkMode: 'class' }
</script>
<style type="text/tailwindcss">
  .nav-item {
    @apply flex items-center px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-gray-800 transition-colors;
  }
  .nav-item.active {
    @apply bg-gray-800 text-white;
  }
</style>
{{end}}

{{define "nav"}}
<aside class="fixed top-0 left-0 h-screen w-64 bg-gray-900 border-r border-gray-800 flex flex-col z-40">
  <div class="p-6 border-b border-gray-800">
    <span class="text-xl font-bold text-white">coder</span>
    <span class="block text-xs text-gray-500 mt-1">{{.Version}}</span>
  </div>
  <nav class="flex-1 p-4 space-y-1">
    <a href="/dashboard/overview" class="nav-item {{if eq .Page "overview"}}active{{end}}">
      <svg class="w-4 h-4 mr-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h8"/></svg>
      Overview
    </a>
    <a href="/dashboard/clients" class="nav-item {{if eq .Page "clients"}}active{{end}}">
      <svg class="w-4 h-4 mr-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-4-4h-1M9 20H4v-2a4 4 0 014-4h1m4-4a4 4 0 100-8 4 4 0 000 8z"/></svg>
      Clients
    </a>
    <a href="/dashboard/activity" class="nav-item {{if eq .Page "activity"}}active{{end}}">
      <svg class="w-4 h-4 mr-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Activity
    </a>
    <a href="/dashboard/settings" class="nav-item {{if eq .Page "settings"}}active{{end}}">
      <svg class="w-4 h-4 mr-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
      Settings
    </a>
  </nav>
  <div class="p-4 border-t border-gray-800">
    <a href="/dashboard/logout" class="flex items-center gap-2 text-sm text-gray-400 hover:text-white transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Sign out
    </a>
  </div>
</aside>
{{end}}
