{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coder dashboard</title>
  <script src="/dashboard/static/js/tailwind.min.js"></script>
  <script src="/dashboard/static/js/htmx.min.js"></script>
  <script src="/dashboard/static/js/chart.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style type="text/tailwindcss">
    .nav-item {
      @apply flex items-center px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-gray-800 transition-colors;
    }
    .nav-item.active {
      @apply bg-gray-800 text-white;
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 flex dark">
  <!-- Sidebar -->
  <aside class="fixed top-0 left-0 h-screen w-64 bg-gray-900 border-r border-gray-800 flex flex-col z-40">
    <div class="p-6 border-b border-gray-800">
      <span class="text-xl font-bold text-white">coder</span>
      <span class="block text-xs text-gray-500 mt-1">{{.Version}}</span>
    </div>
    <nav class="flex-1 p-4 space-y-1">
      <a href="/dashboard/overview" class="nav-item {{if eq .Page "overview"}}active{{end}}">Overview</a>
      <a href="/dashboard/clients" class="nav-item {{if eq .Page "clients"}}active{{end}}">Clients</a>
      <a href="/dashboard/activity" class="nav-item {{if eq .Page "activity"}}active{{end}}">Activity</a>
      <a href="/dashboard/settings" class="nav-item {{if eq .Page "settings"}}active{{end}}">Settings</a>
    </nav>
    <div class="p-4 border-t border-gray-800">
      <a href="/dashboard/logout" class="text-sm text-gray-400 hover:text-white transition-colors">Sign out</a>
    </div>
  </aside>
  <!-- Main content -->
  <main class="ml-64 flex-1 min-h-screen p-8">
    {{template "content" .}}
  </main>
</body>
</html>
{{end}}
